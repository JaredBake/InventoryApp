name: iOS Validation

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-ios-no-sign:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter pub get
        run: flutter pub get

      - name: Build iOS (no codesign)
        run: |
          flutter build ios \
            --release \
            --no-codesign
