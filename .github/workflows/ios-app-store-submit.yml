name: iOS App Store Submit

on:
  workflow_dispatch:
    inputs:
      build_name:
        description: Marketing version (for example 1.0.7)
        required: true
        default: "1.0.0"
      build_number:
        description: Internal build number (for example 107)
        required: true
        default: "1"
      automatic_release:
        description: Release automatically after approval
        required: true
        type: choice
        options:
          - "false"
          - "true"
        default: "false"

jobs:
  build-upload-submit:
    runs-on: macos-latest
    env:
      BUNDLE_ID: ${{ secrets.IOS_BUNDLE_ID }}
      API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"

      - name: Install Fastlane
        run: gem install fastlane --no-document

      - name: Flutter pub get
        run: flutter pub get

      - name: Install Apple signing certificate
        env:
          IOS_DIST_CERT_BASE64: ${{ secrets.IOS_DIST_CERT_BASE64 }}
          IOS_DIST_CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
        run: |
          CERT_P12_PATH="$RUNNER_TEMP/dist-cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"

          echo -n "$IOS_DIST_CERT_BASE64" | base64 --decode -o "$CERT_P12_PATH"

          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_P12_PATH" -P "$IOS_DIST_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "" "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        env:
          IOS_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
        run: |
          PP_PATH="$RUNNER_TEMP/profile.mobileprovision"
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          echo -n "$IOS_PROVISION_PROFILE_BASE64" | base64 --decode -o "$PP_PATH"
          UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' /dev/stdin <<< "$(security cms -D -i "$PP_PATH")")
          cp "$PP_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$UUID.mobileprovision"

      - name: Build signed IPA
        run: |
          flutter build ipa \
            --release \
            --build-name="${{ github.event.inputs.build_name }}" \
            --build-number="${{ github.event.inputs.build_number }}"

      - name: Install App Store Connect API key
        env:
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          KEY_PATH="$HOME/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8"
          echo -n "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode -o "$KEY_PATH"
          cat > "$RUNNER_TEMP/app_store_api_key.json" <<EOF
          {
            "key_id": "${API_KEY_ID}",
            "issuer_id": "${API_ISSUER_ID}",
            "key_filepath": "${KEY_PATH}",
            "in_house": false
          }
          EOF

      - name: Upload to App Store and submit for review
        env:
          APP_STORE_CONNECT_APP_ID: ${{ secrets.APP_STORE_CONNECT_APP_ID }}
        run: |
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" | head -n 1)
          if [ -z "$IPA_PATH" ]; then
            echo "No IPA found in build/ios/ipa"
            exit 1
          fi

          AUTO_RELEASE_FLAG="--automatic_release false"
          if [ "${{ github.event.inputs.automatic_release }}" = "true" ]; then
            AUTO_RELEASE_FLAG="--automatic_release true"
          fi

          APPLE_ID_FLAG=""
          if [ -n "$APP_STORE_CONNECT_APP_ID" ]; then
            APPLE_ID_FLAG="--apple_id $APP_STORE_CONNECT_APP_ID"
          fi

          fastlane deliver \
            --ipa "$IPA_PATH" \
            --app_identifier "$BUNDLE_ID" \
            --api_key_path "$RUNNER_TEMP/app_store_api_key.json" \
            --skip_metadata true \
            --skip_screenshots true \
            --submit_for_review true \
            --force \
            $AUTO_RELEASE_FLAG \
            $APPLE_ID_FLAG
