workflows:
  ios-app-store:
    name: iOS App Store Build
    instance_type: mac_mini_m2
    max_build_duration: 120

    # Replace this with your Codemagic App Store Connect integration name.
    integrations:
      app_store_connect: REPLACE_WITH_ASC_INTEGRATION_NAME

    environment:
      flutter: stable
      xcode: latest
      vars:
        # Replace this with your app bundle identifier from App Store Connect.
        BUNDLE_ID: com.example.inventoryapp
      ios_signing:
        distribution_type: app_store
        bundle_identifier: $BUNDLE_ID

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: Show tool versions
        script: |
          flutter --version
          xcodebuild -version

      - name: Get Flutter dependencies
        script: flutter pub get

      - name: Set up iOS code signing in Xcode project
        script: xcode-project use-profiles

      - name: Build iOS IPA
        script: |
          flutter build ipa \
            --release \
            --build-name=1.0.$BUILD_NUMBER \
            --build-number=$BUILD_NUMBER

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
